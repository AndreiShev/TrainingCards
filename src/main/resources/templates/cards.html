<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:th="http://www.thymeleaf.org" lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CardMaster - Обучение</title>
        <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/common.css}">
    </head>
    <body>
        <!-- Header -->
        <header class="header-cards">
            <div class="container">
                <nav class="nav">
                    <a class="logo" href="/">CardMaster</a>
                </nav>
            </div>
        </header>

        <!-- Main Content -->
        <div class="container">
            <div class="main-layout">
                <!-- Sidebar with Categories -->
                <div class="sidebar">
                    <h3 class="categories-title">Категории карточек</h3>
                    <ul class="categories-list" id="categoriesList">
                        <li th:class="category-item"  th:data-category-id="${category.id}" th:each="category : ${cardCategories}">
                            <span th:text="${category.getName()}"></span>
                            <span th:class="card-count" th:text="${category.cardCount}"></span>
                            <button class="btn btn-close"><img src="/svg/close-circle.svg" alt=""></button>
                        </li>
                    </ul>
                    <button id="addCategoryButton" class="btn btn-secondary" style="width: 100%; margin-top: 1rem;" >
                        + Новая категория
                    </button>
                </div>

                <!-- Content Area -->
                <div class="content">
                    <!-- Cards List View -->
                    <div id="cardsListView">
                        <div class="cards-header">
                            <h2 class="cards-title" id="currentCategory">Выберите категорию</h2>
                            <div class="cards-actions">
                                <button class="btn" id="addCardBtn">
                                    <img class="img-btn" src="/svg/add.svg" alt="">
                                </button>
                                <button class="btn" id="startLearningBtn">
                                    <img class="img-btn" src="/svg/start_lesson.svg" alt="">
                                </button>
                            </div>
                        </div>
                        <div id="cardsContainer">
                            <div class="cards-grid">

                            </div>
                        </div>
                    </div>

                    <!-- Learning View -->
                    <div id="learningView" class="learning-view">
                        <div class="progress-info">
                            Карточка <span id="currentCardNumber">1</span> из <span id="totalCards">0</span>
                        </div>

                        <div class="card-container" id="cardContainer" onclick="flipCard()">
                            <div class="card-content">
                                <div class="card-question-content" id="cardQuestion">
                                    Вопрос появится здесь
                                </div>
                                <div class="card-answer-content" id="cardAnswer">
                                    Ответ появится здесь после нажатия на карточку
                                </div>
                            </div>
                        </div>

                        <div class="navigation">
                            <button class="btn btn-secondary" onclick="prevCard()">
                                ⬅️ Назад
                            </button>
                            <button class="btn btn-outline" onclick="editCurrentCard()">
                                ✏️ Редактировать
                            </button>
                            <button class="btn btn-primary" onclick="nextCard()">
                                Далее ➡️
                            </button>
                        </div>

                        <div style="text-align: center; margin-top: 2rem;">
                            <button class="btn btn-secondary" onclick="backToCards()">
                                ← Вернуться к списку
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script th:inline="javascript" type="module">
            import Cards from '/js/cards.js';
            let cardCategories = /*[[${cardCategories}]]*/ null;
            let CardsComponent = new Cards(cardCategories);
            console.log(cardCategories);
        </script>
    </body>
</html>
