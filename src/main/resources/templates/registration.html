<!Doctype html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org" lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CardMaster - Регистрация</title>
        <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/common.css}">
    </head>
    <body>
        <header>
            <div class="container">
                <nav>
                    <a href="/" class="logo">CardMaster</a>
                    <div class="nav-links">
                        <a href="/login">Войти</a>
                    </div>
                </nav>
            </div>
        </header>
        <div class="modal-window open" id="modalWindowRegisterForm">
            <div class="modal-window__content">
                <div class="modal-header">Регистрация</div>
                <form class="modal-form" method="POST" action="/register" name="registrationForm">
                    <input type="text" name="username" placeholder="Username" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Пароль" required>
                    <div class="modal-window_btns">
                        <input class="modal-form__submit btn-secondary" type="submit" value="регистрация" id="registrationForm_submit">
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
