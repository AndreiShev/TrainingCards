server:
  port: 8080

spring:
  application:
    name: TrainingCards

  devtools:
    restart:
      log-condition-evaluation-delta: false
      enabled: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/training-cards
    username: postgres
    password: postgres
    hikari:
      schema: cards_schema
      connection-init-sql: CREATE schema if not exists cards_schema
      connection-timeout: 10000
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: "+wg4zbtCaJhQwtQMu9SMKTNlPiUv7Qcjl4x1hvqV2Ac="
    tokenExpiration: 24h
    refreshTokenExpiration: 24h